<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if leads_config %}{{ leads_config.host_site_title }} · {{ leads_config.module_title }} Admin Login{% else %}Leads Admin Login{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/leads/static/smx-leads.css">
</head>
<body>
  <header class="smx-topbar">
    <a class="smx-brand" href="/leads/admin">
      <span class="smx-brand-mark">SMX</span>
      <span>{% if leads_config %}{{ leads_config.module_title }} Admin{% else %}Leads Admin{% endif %}</span>
    </a>

    <nav class="smx-nav" aria-label="Leads admin navigation">
      {% if leads_config %}
        <a href="{{ leads_config.host_home_url }}">Main site</a>
      {% endif %}
      <a href="/leads">Lead form</a>
      <a href="/leads/admin/login">Admin login</a>
    </nav>
  </header>

  <main class="smx-shell">
    <section class="smx-panel smx-hero">
      <h1>Leads Admin</h1>
      <p>Enter the admin token to manage lead submissions.</p>
    </section>

    {% if error %}
      <section class="smx-alert" role="alert">
        <strong>{{ error }}</strong>
      </section>
    {% endif %}

    <section class="smx-panel">
      <form method="post" action="/leads/admin/login">
        <label>
          Admin token
          <input type="password" name="admin_token" required>
        </label>

        <button type="submit">Log in</button>
      </form>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if leads_config %}{{ leads_config.host_site_title }} · {{ leads_config.module_title }} Admin Login{% else %}Leads Admin Login{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <main>
    <header>
      {% if leads_config %}
        <a href="{{ leads_config.host_home_url }}">Back to {{ leads_config.host_site_title }}</a>
      {% endif %}
      <h1>Leads Admin</h1>
      <p>Enter the admin token to manage lead submissions.</p>
    </header>

    {% if error %}
      <section role="alert">
        <strong>{{ error }}</strong>
      </section>
    {% endif %}

    <section>
      <form method="post" action="/leads/admin/login">
        <label>
          Admin token
          <input type="password" name="admin_token" required>
        </label>

        <button type="submit">Log in</button>
      </form>
    </section>

    <nav>
      <a href="/leads">Public lead form</a>
    </nav>
  </main>
</body>
</html>

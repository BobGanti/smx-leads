<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ leads_config.host_site_title }} · {{ leads_config.module_title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/leads/static/smx-leads.css">
  {% if leads_config.favicon_url %}
    <link rel="icon" href="{{ leads_config.favicon_url }}">
  {% endif %}
</head>
<body>
  <header class="smx-topbar">
    <a class="smx-brand" href="/leads">
      {% if leads_config.logo_url %}<img class="smx-brand-logo" src="{{ leads_config.logo_url }}" alt="{{ leads_config.host_site_title }} logo">{% else %}<span class="smx-brand-mark">SMX</span>{% endif %}
      <span>{{ leads_config.module_title }}</span>
    </a>

    <nav class="smx-nav smx-desktop-nav" aria-label="Leads navigation">
      <a href="{{ leads_config.host_home_url }}">Main site</a>
      <a href="/leads">Lead form</a>
    </nav>

    <details class="smx-mobile-menu">
      <summary aria-label="Open menu"><span class="smx-mobile-menu-icon" aria-hidden="true"></span></summary>
      <nav class="smx-mobile-menu-panel" aria-label="Mobile leads navigation">
        <a href="{{ leads_config.host_home_url }}">Main site</a>
        <a href="/leads">Lead form</a>
      </nav>
    </details>
  </header>

  <main class="smx-shell">
    <section class="smx-panel smx-hero">
      <h1>{{ leads_config.module_title }}</h1>
      <p>Send us your enquiry and we will get back to you.</p>
    </section>

    {% if error %}
      <section class="smx-alert" role="alert">
        <strong>{{ error }}</strong>
      </section>
    {% endif %}

    <section class="smx-panel">
      <form method="post" action="/leads/submit">
        <input type="hidden" name="source" value="{{ form.source or 'contact' }}">

        <label>
          Full name
          <input type="text" name="full_name" value="{{ form.full_name or '' }}" required>
        </label>

        <label>
          Email
          <input type="email" name="email" value="{{ form.email or '' }}" required>
        </label>

        <label>
          Phone
          <input type="text" name="phone" value="{{ form.phone or '' }}">
        </label>

        <label>
          Company
          <input type="text" name="company" value="{{ form.company or '' }}">
        </label>

        <label>
          Subject
          <input type="text" name="subject" value="{{ form.subject or '' }}">
        </label>

        <label>
          Message
          <textarea name="message" required>{{ form.message or '' }}</textarea>
        </label>

        <div class="smx-honeypot" aria-hidden="true">
          <label>
            Website
            <input type="text" name="website" value="" tabindex="-1" autocomplete="off">
          </label>
        </div>

        <button type="submit">Send enquiry</button>
      </form>
    </section>
  </main>
</body>
</html>

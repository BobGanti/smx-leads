<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ leads_config.host_site_title }} · Thank you</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/leads/static/smx-leads.css">
  {% if leads_config.favicon_url %}
    <link rel="icon" href="{{ leads_config.favicon_url }}">
  {% endif %}
</head>
<body>
  <header class="smx-topbar">
    <a class="smx-brand" href="/leads">
      {% if leads_config.logo_url %}<img class="smx-brand-logo" src="{{ leads_config.logo_url }}" alt="{{ leads_config.host_site_title }} logo">{% else %}<span class="smx-brand-mark">SMX</span>{% endif %}
      <span>{{ leads_config.module_title }}</span>
    </a>

    <nav class="smx-nav smx-desktop-nav" aria-label="Leads navigation">
      <a href="{{ leads_config.host_home_url }}">Main site</a>
      <a href="/leads">Lead form</a>
    </nav>

    <details class="smx-mobile-menu">
      <summary aria-label="Open menu"><span class="smx-mobile-menu-icon" aria-hidden="true"></span></summary>
      <nav class="smx-mobile-menu-panel" aria-label="Mobile leads navigation">
        <a href="{{ leads_config.host_home_url }}">Main site</a>
        <a href="/leads">Lead form</a>
      </nav>
    </details>
  </header>

  <main class="smx-shell">
    <section class="smx-panel smx-hero">
      <h1>Thank you</h1>
      <p>Your enquiry has been received.</p>
    </section>

    <section class="smx-panel">
      {% if lead_id %}
        <p>Reference: {{ lead_id }}</p>
      {% endif %}
      <p><a class="smx-button" href="/leads">Send another enquiry</a></p>
    </section>
  </main>
</body>
</html>
